<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Login - Placement Portal</title>
    <link rel="stylesheet" href="/frontend/css/style.css">
</head>

<body>

<form id="hodLoginForm">

  <div class="login-box">

    <div class="login-header">
        <header>HOD Login</header>
    </div>

    <div class="input-box"> 
      <input type="email" id="hodEmail" class="input-field" name="email" placeholder="HOD Email ID" required>
    </div>

    <div class="input-box"> 
      <input type="password" id="hodPassword" class="input-field" name="password" placeholder="Password" required>
    </div>

    <div class="forgot">
      <section>
        <input type="checkbox" id="check">
        <label for="check">Remember me</label>
      </section> 
      
    </div>

    <div class="input-submit">
      <button type="submit" class="submit-btn" id="hodLoginBtn">Sign In to HOD Panel</button>
    </div>

    

  </div>

</form>

<script src="/frontend/js/hod.js"></script>

</body>
</html>
