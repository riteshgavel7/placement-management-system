<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Job</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="form-container">

    <h2>Create Job</h2>

    <form id="createJobForm">

        <div class="div-input">
            <input id="title" type="text" name="title" placeholder="Job Title" required>
        </div>

        <div class="div-input">
            <input id="companyName" type="text" name="companyName" placeholder="Company Name" required>
        </div>

        <div class="div-input">
            <input id="location" type="text" name="location" placeholder="Location" required>
        </div>

        <div class="div-input">
            <input id="minCGPA" type="number" name="minCGPA" placeholder="Minimum CGPA" step="0.01" required>
        </div>

        <div class="div-input">
           <select id="department" name="department" required style="width: 100%; padding: 10px; margin-top: 5px;">
        <option value="" disabled selected>Select Department</option>
        <option value="CSE">Computer Science (CSE)</option>
        <option value="CSIT">Computer Science (CS)</option>
        <option value="MECHNICAL">Mechanical Engineering (ME)</option>
        <option value="PHYSICS">Physics (PHY)</option>
        <option value="Commerce">Commerce</option>
          </select>
        </div>

        <div class="div-input">
            <input id="package" type="number" name="package" placeholder="Package (LPA)" required>
        </div>

        <div class="div-input">
            <input id="description" type="text" name="description" placeholder="Job Description" required>
        </div>

        <div class="div-input">
            <input id="deadline" type="date" name="deadline" required>
        </div>

        <div class="div-input">
            <button type="submit" class="submit-btn">Post Job</button>
        </div>

    </form>

    <div class="register">
        <p><a href="company-dashboard.html">⬅ Back to Dashboard</a></p>
    </div>

</div>

<script src="js/company.js"></script>

</body>
</html>
