<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Applicants | GGV Placement</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
    }

    .section-box {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .applicant-card {
      border: 1px solid #ddd;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      background: #fafafa;
    }

    .back-btn {
      margin-bottom: 15px;
      padding: 8px 15px;
      background: #333;
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }

    .score {
      font-weight: bold;
    }
  </style>
</head>

<body>

  <div class="section-box">
    <button class="back-btn" onclick="window.history.back()">⬅ Go Back</button>
    <h2>👥 Job Applicants</h2>
    <div id="applicantsContainer">Loading...</div>
  </div>

  <script>
  const API_BASE = "http://localhost:3000/api";

  // ✅ FIX: Checking both "id" (Admin Side) and "jobId" (HOD Side) in URL
  const urlParams = new URLSearchParams(window.location.search);
  const jobId = urlParams.get("id") || urlParams.get("jobId") || localStorage.getItem("selectedJobId");

  function getToken() {
    // ✅ FIX: Admin token added properly. Checked in order of precedence.
    return localStorage.getItem("adminToken") || 
           localStorage.getItem("token") || // HOD Token
           localStorage.getItem("companyToken") || 
           sessionStorage.getItem("companyToken");
  }

  async function loadApplicants() {
    const container = document.getElementById("applicantsContainer");
    const token = getToken();

    // Debugging (Console mein check karne ke liye)
    console.log("Loading applicants for Job ID:", jobId);
    console.log("Active Token Found:", !!token); // true if token exists

    if (!jobId || !token) {
      container.innerHTML = `
        <div style="text-align: center; padding: 20px;">
          <h3 style="color:red;">Session Expired or Job ID Missing!</h3>
          <p>Please login again or ensure you clicked a valid Job Link.</p>
        </div>`;
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/jobs/${jobId}/applicants`, {
        headers: {
          "Authorization": "Bearer " + token,
          "Content-Type": "application/json"
        }
      });

      const data = await res.json();

      if (!res.ok) {
        container.innerHTML = `<p style='color:red; text-align:center;'>${data.message || 'Access Denied'}</p>`;
        return;
      }

      const applicants = data.applicants || [];

      if (applicants.length === 0) {
        container.innerHTML = "<p style='text-align:center; padding: 20px; color: #666;'>No applicants found for this job.</p>";
        return;
      }

      container.innerHTML = applicants.map(app => {
        const student = app.student || {};
        const statusColor = app.status === 'selected' ? '#27ae60' : (app.status === 'rejected' ? '#e74c3c' : '#f39c12');
        
        return `
          <div class="applicant-card" style="border:1px solid #ddd; padding:15px; border-radius:8px; margin-bottom:10px; background:#fff;">
            <h3 style="margin:0 0 10px 0; color:#2c3e50;">${student.name || "Unknown Student"}</h3>
            <p style="margin: 5px 0;"><b>📧 Email:</b> ${student.email || "N/A"}</p>
            <p style="margin: 5px 0;" class="score"><b>📊 Score:</b> ${app.score || 0}%</p>
            <p style="margin: 5px 0;"><b>📌 Status:</b> <span style="color:${statusColor}; font-weight:bold; text-transform:capitalize;">${app.status || "Pending"}</span></p>
            ${student.resume ? 
              `<a href="${student.resume}" target="_blank" style="display:inline-block; margin-top:10px; padding:6px 12px; background:#3498db; color:white; border-radius:4px; text-decoration:none; font-size:13px; font-weight:bold;">📄 View Resume</a>` : 
              '<span style="display:inline-block; margin-top:10px; color:#e74c3c; font-size:13px; font-weight:bold;">🚫 No Resume Uploaded</span>'}
          </div>
        `;
      }).join("");

    } catch (err) {
      console.error("Fetch Applicants Error:", err);
      container.innerHTML = "<p style='color:red; text-align:center;'>Failed to load applicants. Check server connection.</p>";
    }
  }

  document.addEventListener("DOMContentLoaded", loadApplicants);
</script>

</body>
</html>
