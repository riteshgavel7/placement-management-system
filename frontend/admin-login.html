<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Placement Portal</title>
<link rel="stylesheet" href="/frontend/css/style.css">
</head>

<body>

<form id="adminLoginForm">

  <div class="login-box">

    <div class="login-header">
      <header>Admin Login</header>
    </div>

    <div class="input-box"> 
      <input type="email" id="adminEmail" class="input-field" name="email" placeholder="Admin Email" required>
    </div>

    <div class="input-box"> 
      <input type="password" id="adminPassword" class="input-field" name="password" placeholder="Password" required>
    </div>

    <div class="forgot">
      <section>
        <input type="checkbox" id="check">
        <label for="check">Remember me</label>
      </section> 
      <section>
        <a href="#">Contact IT Support?</a> 
      </section>
    </div>

    <div class="input-submit">
      <button type="submit" class="submit-btn" id="adminLoginBtn">Sign In as Admin</button>
    </div>

    

  </div>

</form>

<script src="/frontend/js/admin.js"></script>

</body>
</html>
