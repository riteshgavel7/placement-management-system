<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="css/style.css">
    <title>Login to placement management system</title>
</head>

<body>
<form id="loginForm">
  <div class="login-box">

    <div class="login-header">
      <header>Student Login</header>
    </div>

    <div class="input-box"> 
      <input type="text" class="input-field" id="email" name="email" placeholder="Email" required>
    </div>

    <div class="input-box"> 
      <input type="password" class="input-field" id="password" name="password" placeholder="Password" required>
    </div>

    <div class="forgot">
      <section>
        <input type="checkbox" id="check">
        <label for="check">Remember me</label>
      </section> 
      <section>
        <a href="forgot.html">Forgot password?</a> 
      </section>
    </div>
    
    <div class="input-submit">
      <button type="submit" class="submit-btn">Sign In</button>
    </div>

    <div class="register">
      <p>Don't have an account? 
        <a href="register.html">Register</a>
      </p>
    </div>

    <!-- 🔥 COMPANY LINK -->
    

  </div>
</form>

<script src="js/app.js"></script>
</body>
</html>
