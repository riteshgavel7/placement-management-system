<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Company Login</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<form id="companyLoginForm">

  <div class="login-box">

    <div class="login-header">
      <header>Company Login</header>
    </div>

    <div class="input-box"> 
      <input type="text" id="email" class="input-field" name="email" placeholder="Company Email" required>
    </div>

    <div class="input-box"> 
      <input type="password" id="password" class="input-field" name="password" placeholder="Password" required>
    </div>

    <div class="forgot">
      <section>
        <input type="checkbox" id="check">
        <label for="check">Remember me</label>
      </section> 
      <section>
        <a href="company-forgot.html">Forgot password?</a> 
      </section>
    </div>

    <div class="input-submit">
      <button type="submit" class="submit-btn">Sign In</button>
    </div>

    <div class="register">
      <p>Don't have company account?
        <a href="company-register.html">Register</a>
      </p>
    </div>
   
  </p>

  </div>

</form>

<script src="js/company.js"></script>

</body>
</html>
